<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; padding: 12px; font-size:13px; margin:0; }
    h3 { margin:0; }
    label { display:block; margin-top:10px; font-weight:600; }
    input[type=text] { width:100%; padding:5px; margin-top:3px; box-sizing:border-box; font-size:13px; }
    .option-row { display:flex; gap:6px; margin-top:6px; align-items:center; }
    .option-row input[type=text] { flex:1; }
    select.color-select { width:110px; font-size:13px; }
    .remove-btn { background:#eee; border:1px solid #ccc; border-radius:3px; cursor:pointer; padding:4px 8px; }
    #add-option { margin-top:8px; padding:5px 10px; background:#eee; border:1px solid #ccc; border-radius:3px; cursor:pointer; }
    #save-btn { margin-top:16px; width:100%; padding:8px; background:#0079bf; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:14px; }
    #save-btn:hover { background:#026aa7; }
  </style>
</head>
<body>
  <h3>Champs personnalisés</h3>

  <label for="text-label-input">Nom du champ texte</label>
  <input type="text" id="text-label-input">

  <label for="number-label-input">Nom du champ nombre</label>
  <input type="text" id="number-label-input">

  <label for="checkbox-label-input">Nom de la case à cocher</label>
  <input type="text" id="checkbox-label-input">

  <label for="dropdown-label-input">Nom de la liste déroulante</label>
  <input type="text" id="dropdown-label-input">

  <label>Options de la liste déroulante</label>
  <div id="options-list"></div>
  <button type="button" id="add-option">+ Ajouter une option</button>

  <button type="button" id="save-btn">Enregistrer</button>

  <script src="./settings.js"></script>
</body>
</html>
