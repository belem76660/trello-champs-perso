<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; padding: 12px; font-size:13px; margin:0; }
    h3, h4 { margin:0 0 6px 0; }
    label { display:block; margin-top:8px; font-weight:600; }
    input[type=text] { padding:5px; box-sizing:border-box; font-size:13px; }
    select { font-size:13px; padding:4px; }

    .field-def { border:1px solid #dfe1e6; border-radius:4px; padding:8px 10px; margin-top:10px; background:#fafbfc; }
    .field-def-header { display:flex; align-items:center; gap:6px; }
    .type-badge { font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:#5e6c84; background:#e4e6ea; border-radius:3px; padding:2px 6px; white-space:nowrap; }
    .field-label-input { flex:1; padding:5px; box-sizing:border-box; font-size:13px; }
    .remove-field { background:#eee; border:1px solid #ccc; border-radius:3px; cursor:pointer; padding:4px 8px; }
    .remove-field:hover { background:#ffe0e0; }

    .option-row { display:flex; gap:6px; margin-top:6px; align-items:center; }
    .option-row input[type=text] { flex:1; }
    select.color-select { width:105px; }
    .remove-option { background:#eee; border:1px solid #ccc; border-radius:3px; cursor:pointer; padding:4px 8px; }
    .add-option { margin-top:6px; padding:4px 10px; background:#eee; border:1px solid #ccc; border-radius:3px; cursor:pointer; font-size:12px; }
    .dropdown-options { margin-top:6px; padding-left:2px; }

    #add-field-section { margin-top:16px; border-top:1px solid #dfe1e6; padding-top:12px; }
    #add-field-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    #new-field-type { flex:1 1 120px; min-width:0; }
    #new-field-label { flex:2 1 160px; min-width:0; box-sizing:border-box; }
    #add-field-btn { flex:1 1 100%; padding:7px 12px; background:#0079bf; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:13px; }
    #add-field-btn:hover { background:#026aa7; }

    #save-btn { margin-top:18px; width:100%; padding:8px; background:#0079bf; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:14px; }
    #save-btn:hover { background:#026aa7; }

    #empty-hint { color:#5e6c84; margin-top:10px; }
  </style>
</head>
<body>
  <h3>Champs personnalisés</h3>
  <div id="empty-hint" style="display:none;">Aucun champ défini pour l'instant. Ajoutez-en un ci-dessous.</div>

  <div id="fields-list"></div>

  <div id="add-field-section">
    <h4>Ajouter un champ</h4>
    <div id="add-field-row">
      <select id="new-field-type">
        <option value="text">Texte</option>
        <option value="number">Nombre</option>
        <option value="checkbox">Case à cocher</option>
        <option value="dropdown">Liste déroulante</option>
      </select>
      <input type="text" id="new-field-label" placeholder="Nom du champ (ex: Priorité)">
      <button type="button" id="add-field-btn">+ Ajouter</button>
    </div>
  </div>

  <button type="button" id="save-btn">Enregistrer</button>

  <script src="./settings.js"></script>
</body>
</html>
