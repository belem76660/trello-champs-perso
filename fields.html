<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; padding: 12px; font-size: 13px; margin:0; }
    label { display:block; margin-top:12px; font-weight:600; }
    input[type=text], input[type=number], select { width:100%; padding:6px; margin-top:4px; box-sizing:border-box; font-size:13px; }
    .checkbox-row { display:flex; align-items:center; margin-top:14px; }
    .checkbox-row input { margin-right:8px; width:auto; }
    button { margin-top:18px; width:100%; padding:8px; background:#0079bf; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:14px; }
    button:hover { background:#026aa7; }
  </style>
</head>
<body>
  <form id="fields-form">
    <label id="text-label" for="text-input">Texte</label>
    <input type="text" id="text-input">

    <label id="number-label" for="number-input">Nombre</label>
    <input type="number" id="number-input">

    <div class="checkbox-row">
      <input type="checkbox" id="checkbox-input">
      <label id="checkbox-label" for="checkbox-input" style="margin:0;">Case à cocher</label>
    </div>

    <label id="dropdown-label" for="dropdown-input">Liste déroulante</label>
    <select id="dropdown-input">
      <option value="">-- Aucun --</option>
    </select>

    <button type="submit">Enregistrer</button>
  </form>
  <script src="./fields.js"></script>
</body>
</html>
