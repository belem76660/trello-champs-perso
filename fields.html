<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; padding: 12px; font-size: 13px; margin:0; }

    .field-row { border:1px solid #dfe1e6; border-radius:4px; padding:8px 10px; margin-top:10px; background:#fafbfc; }
    .field-row-top { display:flex; align-items:center; flex-wrap:wrap; justify-content:space-between; gap:6px; }
    .field-row-top .label { font-weight:600; min-width:0; overflow-wrap:anywhere; }
    .field-actions { display:flex; gap:4px; flex-shrink:0; }
    .field-actions button { font-size:11px; padding:3px 7px; border:1px solid #ccc; border-radius:3px; background:#eee; cursor:pointer; white-space:nowrap; }
    .field-actions button:hover { background:#dfe6ec; }
    .field-actions button.active { background:#ffe0b3; border-color:#e0a458; }

    .field-input-wrap { margin-top:6px; }
    input[type=text], input[type=number], select { width:100%; padding:6px; box-sizing:border-box; font-size:13px; }
    .checkbox-line { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .checkbox-line input { width:auto; }

    .field-row.struck .label,
    .field-row.struck .checkbox-line label { text-decoration: line-through; opacity: 0.55; }
    .field-row.struck input,
    .field-row.struck select { text-decoration: line-through; opacity: 0.55; background:#f0f0f0; }

    #no-fields { color:#5e6c84; }

    #save-btn { margin-top:18px; width:100%; padding:8px; background:#0079bf; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:14px; }
    #save-btn:hover { background:#026aa7; }
  </style>
</head>
<body>
  <div id="no-fields" style="display:none;">
    Aucun champ personnalisé n'est configuré pour ce board.<br>
    Ouvrez "Champs personnalisés" depuis la barre du board pour en ajouter.
  </div>

  <div id="fields-container"></div>

  <button type="button" id="save-btn">Enregistrer</button>

  <script src="./fields.js"></script>
</body>
</html>
